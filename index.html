<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
  body {
    display: flex; justify-content: center; align-items: center;
    height: 100vh; background: linear-gradient(135deg, #667eea, #764ba2);
  }

  .calculator {
    background: #1e1e2f; padding: 25px; border-radius: 20px;
    width: 340px; box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    text-align: center;
  }

  .title {
    color: #fff; font-size: 1.5rem; margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .display {
    width: 100%; height: 65px; background: #111;
    color: #00ffcc; font-size: 1.6rem; text-align: right;
    padding: 12px; border-radius: 12px; margin-bottom: 15px;
    overflow-x: auto;
  }

  .buttons {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  }

  button {
    padding: 16px; font-size: 1.1rem; border: none;
    border-radius: 12px; cursor: pointer;
    background: #2e2e48; color: white;
    transition: all 0.2s ease;
  }

  button:hover {
    transform: scale(1.05);
    background: #444;
  }

  button:active {
    transform: scale(0.95);
  }

  .operator { background: #ff9800; }
  .equal { background: #00c853; grid-column: span 2; }
  .clear { background: #e53935; }

  .footer-note {
    color: #aaa; font-size: 0.7rem; margin-top: 10px;
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="title">🧮 Smart Calculator</div>
  <div id="display" class="display">0</div>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button onclick="append('%')">%</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>

  <div class="footer-note">Built with HTML, CSS & JS</div>
</div>

<script>
  let display = document.getElementById('display');

  function append(value) {
    if(display.innerText === '0') display.innerText = '';
    display.innerText += value;
  }

  function clearDisplay() {
    display.innerText = '0';
  }

  function deleteLast() {
    display.innerText = display.innerText.slice(0, -1) || '0';
  }

  function calculate() {
    try {
      display.innerText = eval(display.innerText);
    } catch {
      display.innerText = 'Error';
    }
  }

  document.addEventListener('keydown', (e) => {
    if((e.key >= '0' && e.key <= '9') || ['+','-','*','/','.','%'].includes(e.key)) {
      append(e.key);
    }
    else if(e.key === 'Enter') calculate();
    else if(e.key === 'Backspace') deleteLast();
    else if(e.key === 'Escape') clearDisplay();
  });
</script>

</body>
</html>
